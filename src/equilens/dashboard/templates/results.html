{% extends "base.html" %}
{% block title %}Results{% endblock %}

{% block content %}
<div x-data="resultsPage()" x-init="init()">

  <!-- Page header -->
  <div class="page-header">
    <h1 class="page-title">Results</h1>
    <p class="page-subtitle">Browse analysis outputs</p>
  </div>

  <!-- Loading skeleton -->
  <div x-show="loading" class="card" style="padding:2rem;text-align:center">
    <span>Loading results&hellip;</span>
  </div>

  <!-- Empty state -->
  <div x-show="!loading && results.length === 0" class="card" style="padding:2rem;text-align:center">
    <p style="color:var(--color-text-muted,#888)">No results found</p>
    <p style="font-size:0.875rem;color:var(--color-text-muted,#888);margin-top:0.25rem">
      Run an audit and analyze the output to see results here.
    </p>
  </div>

  <!-- Two-column layout -->
  <div x-show="!loading && results.length > 0" style="display:flex;gap:1.25rem;align-items:flex-start;flex-wrap:wrap">

    <!-- Sidebar: results list -->
    <div class="card" style="flex:0 0 280px;min-width:220px;padding:0;overflow:hidden">
      <div style="padding:0.75rem 1rem;border-bottom:1px solid var(--color-border,#e5e7eb);font-weight:600;font-size:0.875rem">
        Result files
      </div>
      <div style="overflow-y:auto;max-height:70vh">
        <template x-for="result in results" :key="result.name">
          <button
            type="button"
            style="width:100%;text-align:left;padding:0.75rem 1rem;background:none;border:none;border-bottom:1px solid var(--color-border,#e5e7eb);cursor:pointer;transition:background 0.15s"
            :style="selected && selected.name === result.name ? 'background:var(--color-primary-light,#eff6ff)' : ''"
            @click="select(result)"
          >
            <div style="font-size:0.875rem;font-weight:500;word-break:break-all" x-text="result.name"></div>
            <div class="text-muted" style="font-size:0.75rem;margin-top:0.2rem" x-text="fmtDate(result.created)"></div>
            <div class="text-muted" style="font-size:0.75rem" x-text="result.csv_file"></div>
          </button>
        </template>
      </div>
    </div>

    <!-- Content panel -->
    <div style="flex:1;min-width:0">
      <template x-if="selected">
        <div>
          <!-- Actions bar -->
          <div class="card" style="margin-bottom:1rem">
            <div style="display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap">
              <span style="font-weight:600;font-size:0.95rem" x-text="selected.name"></span>
              <div class="flex gap-2" style="margin-left:auto">
                <a
                  :href="'/api/results/' + selected.name + '/export'"
                  target="_blank"
                  class="btn btn-sm btn-secondary"
                >Download ZIP</a>
                <button
                  type="button"
                  class="btn btn-sm btn-primary"
                  @click="viewReport()"
                  x-show="!reportVisible"
                >View Report</button>
                <button
                  type="button"
                  class="btn btn-sm btn-secondary"
                  @click="reportVisible = false"
                  x-show="reportVisible"
                >Close Report</button>
              </div>
            </div>
          </div>

          <!-- Iframe report -->
          <div x-show="reportVisible" class="card" style="padding:0;overflow:hidden">
            <iframe
              class="result-frame"
              :src="'/api/results/' + selected.name + '/html'"
              style="width:100%;height:75vh;border:none;display:block"
            ></iframe>
          </div>

          <!-- Placeholder when report not yet open -->
          <div x-show="!reportVisible" class="card" style="padding:2rem;text-align:center">
            <p style="color:var(--color-text-muted,#888)">Click "View Report" to load the HTML report.</p>
          </div>
        </div>
      </template>
    </div>

  </div>

</div>
{% endblock %}

{% block extra_scripts %}
<script>
function resultsPage() {
  return {
    results: [],
    selected: null,
    reportVisible: false,
    loading: true,

    async init() {
      const data = await apiGet('/api/results');
      this.results = data.results;
      this.loading = false;
      if (this.results.length) this.selected = this.results[0];
    },

    select(result) {
      this.selected = result;
      this.reportVisible = false;
    },

    viewReport() {
      this.reportVisible = true;
    },
  };
}
</script>
{% endblock %}
