services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  equilens:
    image: ghcr.io/life-experimentalist/equilens:latest
    container_name: equilens-app
    ports:
      - "7860:7860"
      - "8000:8000"
    volumes:
      - equilens_data:/workspace/data
      # For development: mount source code for live editing
      # - ./src:/workspace/src:ro
      - ./public:/workspace/public:ro
    environment:
      # Ollama Configuration
      # Use the ollama service name within the docker compose network
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_API_BASE=http://ollama:11434/api
      - OLLAMA_PORT=11434
      # EquiLens Configuration
      - EQUILENS_DATA_DIR=/workspace/data
      - EQUILENS_RESULTS_DIR=/workspace/data/results
      - EQUILENS_LOGS_DIR=/workspace/data/logs
      - EQUILENS_CORPUS_DIR=/workspace/src/Phase1_CorpusGenerator/corpus
      # Gradio Configuration
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860
      - GRADIO_ANALYTICS_ENABLED=false
      - GRADIO_THEME=default
    restart: unless-stopped
    stdin_open: true
    tty: true
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7860/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  ollama_data:
    external: true
  equilens_data:
    driver: local
    name: equilens-data
