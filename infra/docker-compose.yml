services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  equilens:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    image: equilens-app
    container_name: equilens-app
    ports:
      - "8000:8000"
    volumes:
      - equilens_data:/workspace/data
      - equilens_backups:/workspace/backups
      - ../public:/workspace/public:ro
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_API_BASE=http://ollama:11434/api
      - EQUILENS_DATA_DIR=/workspace/data
      - EQUILENS_RESULTS_DIR=/workspace/data/results
      - EQUILENS_LOGS_DIR=/workspace/data/logs
      - EQUILENS_CORPUS_DIR=/workspace/data/corpus
      - EQUILENS_BACKUP_INTERVAL_MINUTES=30
      - EQUILENS_BACKUP_RETENTION=10
      - EQUILENS_BACKUP_DIR=/workspace/backups
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  ollama_data:
    driver: local
    name: equilens-ollama-data
  equilens_data:
    driver: local
    name: equilens-data
  equilens_backups:
    driver: local
    name: equilens-backups
